name: Attest release build

# Triggered by the version tag that release.sh pushes (release.sh then creates the
# GitHub release as a DRAFT). It rebuilds main.js in CI, generates a signed
# build-provenance attestation for all three release assets (main.js, styles.css,
# manifest.json), re-uploads them so what users download matches the attestation,
# and only then flips the release to published. Publishing last means a public
# release never exists with un-attested assets. Verify any asset with, e.g.:
#   gh attestation verify main.js --repo christian-luger-at/obsidian-focus-first
#   gh attestation verify styles.css --repo christian-luger-at/obsidian-focus-first
#
# The trigger is the tag push, not the "release" event: a release created as a
# draft does not fire release events, so this is the reliable signal. Also runnable
# manually (workflow_dispatch) with a tag input to (re-)attest a release; the
# publish step is a no-op if it is already published.
on:
    push:
        tags:
            - '*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing release tag to attest (e.g. 1.0.3)'
                required: true

permissions:
    contents: write # upload the attested asset to the release
    id-token: write # OIDC identity used to sign the attestation
    attestations: write # store the attestation

jobs:
    attest:
        runs-on: ubuntu-latest
        env:
            # The release tag: the event's ref for a release, or the manual input.
            TAG: ${{ github.event.inputs.tag || github.ref_name }}
        steps:
            # Check out exactly the tagged source the release was cut from.
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v6
              with:
                  node-version: 25.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build

            - name: Attest build provenance for the release assets
              uses: actions/attest-build-provenance@v2
              with:
                  # All three published assets: the built main.js plus the
                  # shipped styles.css and manifest.json (checked out at the tag).
                  subject-path: |
                      main.js
                      styles.css
                      manifest.json

            - name: Upload attested assets, then publish the release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # release.sh pushes the tag (this trigger) and then creates the
                  # draft release a moment later. The build above normally outlasts
                  # that, but wait briefly so we never race ahead of the draft.
                  for i in $(seq 1 30); do
                      gh release view "${TAG}" >/dev/null 2>&1 && break
                      echo "Waiting for release ${TAG} to exist ($i)..."
                      sleep 2
                  done
                  gh release upload "${TAG}" main.js styles.css manifest.json --clobber
                  # Flip the draft to published only now that the attested assets
                  # are in place. A no-op if the release is already published (e.g.
                  # a manual re-attest of an older release).
                  gh release edit "${TAG}" --draft=false
