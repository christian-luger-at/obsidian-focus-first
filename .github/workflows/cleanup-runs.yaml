name: Cleanup old workflow runs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}  

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs older than 7 days
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 3
          # Für den ersten Testlauf empfohlen: erst mit true prüfen, was gelöscht würde
          # dry_run: true
