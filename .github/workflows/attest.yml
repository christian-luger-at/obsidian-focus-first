name: Attest release build

# Runs after release.sh has created and published the GitHub release. It rebuilds
# main.js in CI, generates a signed build-provenance attestation for it, and
# replaces the release's main.js with the attested CI build so what users download
# matches the attestation. Verify with:
#   gh attestation verify main.js --repo christian-luger-at/obsidian-focus-first
#
# Also runnable manually (workflow_dispatch) with a tag input to attest an
# already-published release retroactively.
on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing release tag to attest (e.g. 1.0.3)'
                required: true

permissions:
    contents: write # upload the attested asset to the release
    id-token: write # OIDC identity used to sign the attestation
    attestations: write # store the attestation

jobs:
    attest:
        runs-on: ubuntu-latest
        env:
            # The release tag: the event's ref for a release, or the manual input.
            TAG: ${{ github.event.inputs.tag || github.ref_name }}
        steps:
            # Check out exactly the tagged source the release was cut from.
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v6
              with:
                  node-version: 25.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build

            - name: Attest build provenance for main.js
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Upload attested main.js to the release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release upload "${TAG}" main.js --clobber
