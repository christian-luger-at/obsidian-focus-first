name: Attest release build

# Runs after release.sh has created and published the GitHub release. It rebuilds
# main.js in CI, generates a signed build-provenance attestation for all three
# release assets (main.js, styles.css, manifest.json), and re-uploads them so what
# users download matches the attestation. Verify any asset with, e.g.:
#   gh attestation verify main.js --repo christian-luger-at/obsidian-focus-first
#   gh attestation verify styles.css --repo christian-luger-at/obsidian-focus-first
#
# The trigger MUST stay a "release" event. Obsidian's community-plugin review only
# accepts provenance whose build was triggered by a release; attestations produced
# from a tag push or a manual workflow_dispatch are rejected ("attestation ... does
# not match this repository"), even though `gh attestation verify` accepts them.
# A draft release fires no event at all, so the release cannot be attested before
# it is published.
#
# Also runnable manually (workflow_dispatch) with a tag input, but note that such
# an attestation carries event_name=workflow_dispatch and will NOT satisfy the
# review; use it only for local checks, never to fix a release.
on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing release tag to attest (e.g. 1.0.3)'
                required: true

permissions:
    contents: write # upload the attested asset to the release
    id-token: write # OIDC identity used to sign the attestation
    attestations: write # store the attestation

jobs:
    attest:
        runs-on: ubuntu-latest
        env:
            # The release tag: the event's ref for a release, or the manual input.
            TAG: ${{ github.event.inputs.tag || github.ref_name }}
        steps:
            # Check out exactly the tagged source the release was cut from.
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v6
              with:
                  node-version: 25.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build

            - name: Attest build provenance for the release assets
              uses: actions/attest-build-provenance@v2
              with:
                  # All three published assets: the built main.js plus the
                  # shipped styles.css and manifest.json (checked out at the tag).
                  subject-path: |
                      main.js
                      styles.css
                      manifest.json

            - name: Upload attested assets to the release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release upload "${TAG}" main.js styles.css manifest.json --clobber
